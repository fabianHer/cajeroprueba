<div class="jumbotron">
    <h1 class="display-4">Hello!!!!</h1>
    <p class="lead">Bienvenido.....</p>
    <hr class="my-4">
    <div *ngIf="message" class="alert alert-success" role="alert">
        El usuario {{usuario.nombre}} ha sido registrado!!!
    </div>
    <form (ngSubmit)="login(l)" #l="ngForm">
        <div class="form-group col-3 ">
            <label for="exampleInputEmail1">Cedula</label>
            <input type="text" class="form-control" aria-describedby="emailHelp" name="cedula" [ngModel]="usuario.cedula" cedula placeholder="Cedula">
        </div>
        <div class="form-group col-3">
            <label for="exampleInputPassword1 ">Password</label>
            <input type="password" class="form-control" name="clave" [ngModel]="usuario.clave" clave placeholder="Clave">
        </div>
        <div class="form-group col-3">
            <button type="submit" class="btn btn-primary btn-lg">Ingresar</button>
        </div>
    </form>
</div>
